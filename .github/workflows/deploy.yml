name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: nirbhay-488421
  SERVICE_NAME: metro-buildin
  REGION: us-central1
  IMAGE_NAME: gcr.io/nirbhay-488421/metro-buildin

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if any)
        run: npm test --if-present
        continue-on-error: true

      - name: Build application
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg VCS_REF=${{ github.sha }} \
            .

      - name: Push Docker image to GCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: |
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --timeout=300
            --allow-unauthenticated
            --port=8080
            --set-env-vars=NODE_ENV=production

      - name: Show deployment URL
        run: |
          echo "🚀 Application deployed successfully!"
          echo "📍 URL: ${{ steps.deploy.outputs.url }}"
          echo "🔗 Visit your app at: ${{ steps.deploy.outputs.url }}"

      - name: Verify deployment
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Verifying deployment at $URL"
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" $URL)
          if [ $STATUS -eq 200 ]; then
            echo "✅ Deployment verification successful (HTTP $STATUS)"
          else
            echo "⚠️  Received HTTP $STATUS from application"
          fi

      - name: Cleanup old images
        if: success()
        run: |
          echo "Cleaning up old container images..."
          gcloud container images list-tags ${{ env.IMAGE_NAME }} \
            --filter='-tags:*' --format="get(digest)" --limit=10 | \
          while read digest; do
            gcloud container images delete "${{ env.IMAGE_NAME }}@${digest}" --quiet || true
          done
